<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6Lottery Prediction Sync</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { width: 340px; border: 2px solid #ff0000; border-radius: 20px; padding: 20px; background: #111; box-shadow: 0 0 20px #ff000044; }
        .period-box { background: #1a1a1a; padding: 10px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; }
        .period-id { color: #ffd700; font-size: 18px; font-weight: bold; }
        .result { font-size: 70px; font-weight: 900; color: #ff0000; margin: 20px 0; text-shadow: 0 0 15px #ff0000; }
        .timer { background: #ff0000; padding: 5px 20px; border-radius: 20px; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <div class="period-box">
            <div style="font-size: 12px; color: #888;">PERIOD (30S)</div>
            <div id="p-id" class="period-id">Loading...</div>
        </div>
        <div id="res" class="result">WAIT</div>
        <div id="time" class="timer">00:30</div>
    </div>

    <script>
        function updatePeriod() {
    let now = new Date();
    let utc = now.getTime() + (now.getTimezoneOffset() * 60000);
    let mmTime = new Date(utc + (3600000 * 6.5)); // GMT +6:30

    let year = mmTime.getFullYear();
    let month = String(mmTime.getMonth() + 1).padStart(2, '0');
    let day = String(mmTime.getDate()).padStart(2, '0');

    let hours = mmTime.getHours();
    let minutes = mmTime.getMinutes();
    let seconds = mmTime.getSeconds();
    let totalSecondsPassed = (hours * 3600) + (minutes * 60) + seconds;

    // ဂိမ်းဆိုဒ်နဲ့ ကိုက်ညီအောင် ညှိထားသော တွက်ချက်မှု (Win Go 30s)
    // ပုံ ၁၁၉ ပါ နံပါတ်ရရန် အခြေခံကိန်းကို ညှိပေးထားပါသည်
    let basePeriod = Math.floor(totalSecondsPassed / 30);
    let currentPeriod = basePeriod + 4958; // ကွာဟချက်ကို ပေါင်းထည့်ခြင်း

    let periodString = `${year}${month}${day}1000${String(currentPeriod).padStart(5, '0')}`;
    
    let display = document.querySelector('div[style*="color: rgb(255, 193, 7)"]') || document.getElementById('periodDisplay');
    if (display) {
        display.innerText = periodString;
    }
}
setInterval(updatePeriod, 1000);
updatePeriod();
