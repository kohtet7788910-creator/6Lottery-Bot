<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6Lottery Predictor</title>
    <style>
        body { background-color: #000; color: #fff; text-align: center; font-family: Arial; padding-top: 50px; }
        .box { border: 2px solid red; border-radius: 15px; padding: 20px; display: inline-block; width: 80%; }
        #periodDisplay { color: #FFC107; font-size: 20px; font-weight: bold; margin-bottom: 20px; }
        #prediction { font-size: 50px; font-weight: bold; color: red; margin: 20px 0; }
        .timer { background: red; color: #fff; padding: 10px; border-radius: 20px; width: 150px; margin: 0 auto; }
    </style>
</head>
<body>
    <div class="box">
        <div>PERIOD (30S)</div>
        <div id="periodDisplay">Loading...</div>
        <div id="prediction">WAIT</div>
        <div class="timer" id="timer">00:30</div>
    </div>

    <script>
        function updateApp() {
            let now = new Date();
            let utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            let mmTime = new Date(utc + (3600000 * 6.5)); // မြန်မာစံတော်ချိန်

            let year = mmTime.getFullYear();
            let month = String(mmTime.getMonth() + 1).padStart(2, '0');
            let day = String(mmTime.getDate()).padStart(2, '0');

            let totalSecs = (mmTime.getHours() * 3600) + (mmTime.getMinutes() * 60) + mmTime.getSeconds();
            
            // ဂိမ်းဆိုဒ်နဲ့ ကိုက်ညီအောင် ညှိထားသော Period (ပုံ ၁၁၉ အရ)
            let currentPeriod = Math.floor(totalSecs / 30) + 4958; 
            let periodString = `${year}${month}${day}1000${String(currentPeriod).padStart(5, '0')}`;
            
            // စာသားများ အစားထိုးခြင်း
            document.getElementById('periodDisplay').innerText = periodString;

            // Timer ပြုလုပ်ခြင်း
            let timeLeft = 30 - (totalSecs % 30);
            document.getElementById('timer').innerText = "00:" + String(timeLeft).padStart(2, '0');

            // Prediction ပြောင်းလဲခြင်း (ဥပမာပေးထားခြင်း)
            if (timeLeft > 5) {
                document.getElementById('prediction').innerText = (currentPeriod % 2 === 0) ? "BIG" : "SMALL";
                document.getElementById('prediction').style.color = (currentPeriod % 2 === 0) ? "red" : "#2196F3";
            } else {
                document.getElementById('prediction').innerText = "WAIT";
                document.getElementById('prediction').style.color = "white";
            }
        }

        setInterval(updateApp, 1000);
        updateApp();
    </script>
</body>
</html>
